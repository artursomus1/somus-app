appId: com.somuscapital.app
productName: Somus Capital
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon_somus.ico
  signingHashAlgorithms: []
  sign: null
forceCodeSigning: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Somus Capital
publish:
  provider: github
  owner: artursomus1
  repo: somus-app
